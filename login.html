<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Diário de Classe</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
margin-top:60px;
}

.box{
background:white;
width:300px;
margin:auto;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px;
margin:5px;
width:95%;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

.erro{
color:red;
font-size:14px;
}
</style>

</head>

<body>

<div class="box">

<h2>Diário de Classe</h2>

{% if erro %}
<p class="erro">{{ erro }}</p>
{% endif %}

<form method="POST">

<input name="usuario" placeholder="Usuário" required>

<input name="senha" type="password" placeholder="Senha" required>

<button type="submit">Entrar</button>

</form>

<br>

<a href="/criar">Criar Usuário</a>

</div>

</body>
</html>

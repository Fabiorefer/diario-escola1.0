<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lançamento de Notas</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
margin:0;
}

.box{
background:white;
width:1000px;
margin:auto;
margin-top:30px;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

table{
border-collapse: collapse;
width:100%;
}

td,th{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

th{
background:#f1f1f1;
}

input{
width:60px;
padding:4px;
}

select{
padding:6px;
margin:3px;
}

button{
padding:8px 15px;
margin-top:10px;
border:none;
background:#2c7be5;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5ed8;
}

.voltar{
background:#6c757d;
}

.voltar:hover{
background:#545b62;
}

.msg{
background:#d4edda;
padding:10px;
margin-bottom:10px;
border-radius:5px;
}

.media{
font-weight:bold;
background:#f8f9fa;
}

</style>

<script>

function calcularMedia(nome){

let p1 = parseFloat(document.getElementById("p1_"+nome).value) || 0
let p2 = parseFloat(document.getElementById("p2_"+nome).value) || 0
let trab = parseFloat(document.getElementById("trab_"+nome).value) || 0
let part = parseFloat(document.getElementById("part_"+nome).value) || 0
let tarefa = parseFloat(document.getElementById("tarefa_"+nome).value) || 0

let media =
(p1 * 0.3) +
(p2 * 0.3) +
(trab * 0.1333) +
(part * 0.1333) +
(tarefa * 0.1333)

document.getElementById("media_"+nome).innerHTML = media.toFixed(1)

}

</script>

</head>

<body>

<div class="box">

<h2>Lançamento de Notas</h2>

{% if salvo %}
<div class="msg">
Notas salvas com sucesso
</div>
{% endif %}

<form method="GET">

Disciplina
<select name="disciplina">
<option value="">Selecione</option>

{% for d in disciplinas %}
<option value="{{ d.disciplina }}" {% if disciplina==d.disciplina %}selected{% endif %}>
{{ d.disciplina }}
</option>
{% endfor %}
</select>

Turma
<select name="turma">
<option value="">Selecione</option>

{% for t in turmas %}
<option value="{{ t }}" {% if turma==t %}selected{% endif %}>
{{ t }}
</option>
{% endfor %}
</select>

Bimestre
<select name="bimestre">
<option value="">Selecione</option>

<option value="1" {% if bimestre=="1" %}selected{% endif %}>1º</option>
<option value="2" {% if bimestre=="2" %}selected{% endif %}>2º</option>
<option value="3" {% if bimestre=="3" %}selected{% endif %}>3º</option>
<option value="4" {% if bimestre=="4" %}selected{% endif %}>4º</option>

</select>

<button type="submit">Carregar</button>

</form>

<br>

{% if alunos %}

<form method="POST">

<input type="hidden" name="disciplina" value="{{ disciplina }}">
<input type="hidden" name="turma" value="{{ turma }}">
<input type="hidden" name="bimestre" value="{{ bimestre }}">

<table>

<tr>
<th>Aluno</th>
<th>P1</th>
<th>P2</th>
<th>Trabalho</th>
<th>Participação</th>
<th>Tarefa</th>
<th>Média</th>
</tr>

{% for a in alunos %}
<tr>

<td style="text-align:left">{{ a.aluno }}</td>

<td>
<input type="number" step="0.1" id="p1_{{a.aluno}}"
name="p1_{{ a.aluno }}"
value="{{ notas.get(a.aluno, {}).get('p1','') }}"
onkeyup="calcularMedia('{{a.aluno}}')">
</td>

<td>
<input type="number" step="0.1" id="p2_{{a.aluno}}"
name="p2_{{ a.aluno }}"
value="{{ notas.get(a.aluno, {}).get('p2','') }}"
onkeyup="calcularMedia('{{a.aluno}}')">
</td>

<td>
<input type="number" step="0.1" id="trab_{{a.aluno}}"
name="trab_{{ a.aluno }}"
value="{{ notas.get(a.aluno, {}).get('trab','') }}"
onkeyup="calcularMedia('{{a.aluno}}')">
</td>

<td>
<input type="number" step="0.1" id="part_{{a.aluno}}"
name="part_{{ a.aluno }}"
value="{{ notas.get(a.aluno, {}).get('part','') }}"
onkeyup="calcularMedia('{{a.aluno}}')">
</td>

<td>
<input type="number" step="0.1" id="tarefa_{{a.aluno}}"
name="tarefa_{{ a.aluno }}"
value="{{ notas.get(a.aluno, {}).get('tarefa','') }}"
onkeyup="calcularMedia('{{a.aluno}}')">
</td>

<td class="media" id="media_{{a.aluno}}">
-
</td>

</tr>

<script>
window.addEventListener("load", function(){
calcularMedia("{{a.aluno}}")
})
</script>

{% endfor %}

</table>

<br>

<button type="submit">Salvar Notas</button>

</form>

{% endif %}

<br>

<button onclick="window.location.href='/menu'" class="voltar">
Voltar
</button>

</div>

</body>
</html>

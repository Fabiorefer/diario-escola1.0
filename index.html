<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Diário de Classe</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
margin:0;
padding:0;
}

.box{
background:white;
width:340px;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
margin-top:0;
}

button{
width:100%;
padding:12px;
margin:6px 0;
font-size:15px;
border:none;
border-radius:5px;
background:#2c7be5;
color:white;
cursor:pointer;
}

button:hover{
background:#1a5ed8;
}

.logout{
background:#dc3545;
}

.logout:hover{
background:#b02a37;
}

</style>

</head>

<body>

<div class="box">

<h2>Diário de Classe</h2>

<h3>Bem-vindo, {{ session.usuario }}</h3>

<button onclick="window.location.href='/disciplinas'">
Disciplinas
</button>

<button onclick="window.location.href='/turmas'">
Turmas
</button>

<button onclick="window.location.href='/alunos'">
Alunos
</button>

<button onclick="window.location.href='/presenca'">
Presença
</button>

<button onclick="window.location.href='/notas'">
Notas
</button>

<button onclick="window.location.href='/conteudos'">
Conteúdos
</button>

<button onclick="window.location.href='/relatorio'">
Relatório PDF
</button>

<hr>

<button onclick="window.location.href='/logout'" class="logout">
Sair
</button>

</div>

</body>
</html>

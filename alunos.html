<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alunos</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
margin:0;
}

.box{
background:white;
width:400px;
margin:auto;
margin-top:30px;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

select,input{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
font-size:15px;
border:none;
border-radius:5px;
background:#2c7be5;
color:white;
cursor:pointer;
}

button:hover{
background:#1a5ed8;
}

.voltar{
background:#6c757d;
}

.voltar:hover{
background:#545b62;
}

ul{
list-style:none;
padding:0;
}

li{
background:#f1f1f1;
margin:5px;
padding:8px;
border-radius:5px;
}

.sucesso{
color:green;
}

</style>

</head>

<body>

<div class="box">

<h2>Alunos</h2>

{% if sucesso %}
<p class="sucesso">Aluno cadastrado com sucesso!</p>
{% endif %}

<form method="POST">

<select name="disciplina" required>
<option value="">Disciplina</option>
{% for d in disciplinas %}
<option value="{{ d.disciplina }}">{{ d.disciplina }}</option>
{% endfor %}
</select>

<select name="turma" required>
<option value="">Turma</option>
{% for t in turmas %}
<option value="{{ t }}">{{ t }}</option>
{% endfor %}
</select>

<input name="aluno" placeholder="Nome do aluno" required>

<button type="submit">Adicionar Aluno</button>

</form>

<hr>

<h3>Alunos cadastrados</h3>

<ul>
{% for a in alunos %}
<li>{{ a.disciplina }} - {{ a.turma }} - {{ a.aluno }}</li>
{% endfor %}
</ul>

<br>

<button onclick="window.location.href='/menu'" class="voltar">
Voltar
</button>

</div>

</body>
</html>

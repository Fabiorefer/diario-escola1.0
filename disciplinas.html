<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Disciplinas</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
margin:0;
}

.box{
background:white;
width:350px;
margin:auto;
margin-top:40px;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
font-size:15px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

select{
width:100%;
padding:10px;
font-size:15px;
border-radius:5px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
font-size:15px;
border:none;
border-radius:5px;
background:#2c7be5;
color:white;
cursor:pointer;
}

button:hover{
background:#1a5ed8;
}

.voltar{
background:#6c757d;
}

.voltar:hover{
background:#545b62;
}

.sucesso{
color:green;
font-size:14px;
}

</style>

</head>

<body>

<div class="box">

<h2>Disciplinas</h2>

<!-- MENSAGEM -->
{% if sucesso %}
<p class="sucesso">Disciplina cadastrada com sucesso!</p>
{% endif %}

<!-- CADASTRAR DISCIPLINA -->
<form method="POST">
<input type="text" name="nova_disciplina" placeholder="Digite a disciplina" required>
<button type="submit">Cadastrar Disciplina</button>
</form>

<br>

<!-- LISTA -->
<select size="8">
{% for d in disciplinas %}
<option>{{ d }}</option>
{% endfor %}
</select>

<br>

<!-- BOTÕES -->
<button onclick="window.location.href='/menu'" class="voltar">
Voltar
</button>

</div>

</body>
</html>
